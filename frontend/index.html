<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // If a user opens a server route like /admin/... directly (no hash),
      // redirect into the HashRouter URL (/#/admin/...) so client routing works.
      (function () {
        try {
          var path = window.location.pathname || "";
          var search = window.location.search || "";
          if (!window.location.hash && path.startsWith("/admin")) {
            var target = window.location.origin + "/#" + path + search + window.location.hash;
            window.location.replace(target);
          }
        } catch (e) {
          // fail silently
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
