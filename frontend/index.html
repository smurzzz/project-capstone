<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // If a user opens a client route directly (no hash), redirect into the
      // HashRouter URL (/#/...) so client routing works on Vercel and in emails.
      (function () {
        try {
          var path = window.location.pathname || "";
          var search = window.location.search || "";
          var isAsset = /\.(?:css|js|map|png|jpg|jpeg|gif|svg|webp|ico|txt|json)$/i.test(path);
          var isApi = path.startsWith("/api/");
          var isRoot = path === "/";
          if (!window.location.hash && !isAsset && !isApi && !isRoot) {
            var target = window.location.origin + "/#" + path + search;
            window.location.replace(target);
          }
        } catch (e) {
          // fail silently
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
